name: Question
description: "Ask a question about SmartLink Manager. Not for bug reports."
labels: ['type: question', 'status: needs triage']
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check:

          - I've searched the [documentation](https://github.com/LindemannRock/craft-smartlink-manager/tree/main/docs).
          - I've searched [open and closed issues](https://github.com/LindemannRock/craft-smartlink-manager/issues?q=is%3Aissue).
          - This is not a bug report — just a general question.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Is it possible to...
    validations:
      required: true

  - type: input
    id: craft-version
    attributes:
      label: Craft CMS exact version
      description: "**Do not write \"latest\"** — check Craft's System Report."
      placeholder: e.g. 5.6.1
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "SmartLink Manager version"
      description: "**Do not write \"latest\"** — check Craft's System Report or Settings → Plugins."
      placeholder: e.g. 5.2.0
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Check Craft's System Report.
      placeholder: e.g. 8.3.30

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, code snippets, or anything that helps clarify your question.
